name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Create .env file
        run: |
          cp .env.example .env
          echo "APP_KEY=base64:$(openssl rand -base64 32)" >> .env

      - name: Build and start containers
        run: docker-compose up -d --build

      - name: Wait for container to be ready
        run: |
          # Ждём, пока PHP-FPM запустится
          sleep 10
          docker exec steam-app php artisan config:clear

      - name: Run code style check (Pint)
        run: docker exec -t steam-app composer format:test

      - name: Run static analysis (PHPStan)
        run: docker exec -t steam-app composer analyse

      - name: Run tests (Pest)
        run: docker exec -t steam-app composer test

      - name: Shutdown containers
        if: always()
        run: docker-compose down