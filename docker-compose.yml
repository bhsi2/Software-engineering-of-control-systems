version: '3.8'

services:
  app:
    build: .
    container_name: steam-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=${APP_ENV}
      - APP_DEBUG=${APP_DEBUG}
      - APP_URL=${APP_URL}
      - STEAM_API_KEY=${STEAM_API_KEY}
    networks:
      - app-network

  webserver:
    image: nginx:alpine
    container_name: steam-stats-nginx
    restart: unless-stopped
    ports:
      - "8084:80"
    volumes:
      - ./public:/var/www/html/public
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network


networks:
  app-network:
    driver: bridge
